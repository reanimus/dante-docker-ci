# Minimal dante (sockd) SOCKS proxy configuration.
# Logs go to stderr so they surface via `docker logs` / journald.
logoutput: stderr

internal: 0.0.0.0 port = 1080
external: eth0

# No authentication: access is gated purely by source CIDR below.
socksmethod: none
clientmethod: none

user.privileged: root
user.unprivileged: nobody

# Note: this default configuration essentially sets up an open SOCKS proxy,
# which should not be exposed to the open internet. You should probably do
# one of two things: either run the Docker image using host networking and
# set your LAN range as allowed, or change socksmethod to "username" and
# set up authentication.
client pass {
    from: 0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}

socks pass {
    from: 0.0.0/0 to: 0.0.0.0/0
    log: connect disconnect error
}