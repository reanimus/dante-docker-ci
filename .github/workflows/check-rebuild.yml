name: check-rebuild

on:
  repository_dispatch:
    types: [check-upstream]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/dante
  ALPINE_TAG: alpine:3.24
  ALPINE_BRANCH: v3.24

jobs:
  # ---------------------------------------------------------------------------
  # Watch: compare current upstream state (base image digest + dante-server
  # version) against what the last published image was built from. Only proceed
  # if something actually changed.
  # ---------------------------------------------------------------------------
  check:
    runs-on: ubuntu-24.04
    permissions:
      packages: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      base_digest: ${{ steps.cur.outputs.base_digest }}
      dante_version: ${{ steps.cur.outputs.dante_version }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        run: |
          curl -sSL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin crane

      - name: Determine current upstream state
        id: cur
        run: |
          base_digest="$(crane digest "${ALPINE_TAG}")"

          # Read the exact dante-server version from the Alpine APKINDEX for one arch.
          get_ver() {
            curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/${ALPINE_BRANCH}/community/$1/APKINDEX.tar.gz" \
            | tar -xzO APKINDEX \
            | awk -v RS='' '{v="";p=0; for(i=1;i<=NF;i++){if($i=="P:dante-server")p=1; if($i ~ /^V:/)v=substr($i,3)} if(p)print v}'
          }

          v_amd64="$(get_ver x86_64)"
          v_arm64="$(get_ver aarch64)"

          echo "base_digest=${base_digest}" >> "$GITHUB_OUTPUT"

          # Only build when both arches agree on a version. During the brief
          # window when Alpine has published a new package for one arch but not
          # the other, wait rather than ship a mismatched manifest.
          if [ -n "${v_amd64}" ] && [ "${v_amd64}" = "${v_arm64}" ]; then
            echo "dante_version=${v_amd64}" >> "$GITHUB_OUTPUT"
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "Arch skew or missing build (amd64='${v_amd64}' arm64='${v_arm64}'); waiting for parity."
            echo "dante_version=" >> "$GITHUB_OUTPUT"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read last built state
        id: last
        run: |
          if cfg="$(crane config "${IMAGE}:latest" 2>/dev/null)"; then
            echo "base_digest=$(echo "$cfg" | jq -r '.config.Labels["org.opencontainers.image.base.digest"] // ""')" >> "$GITHUB_OUTPUT"
            echo "dante_version=$(echo "$cfg" | jq -r '.config.Labels["dante.version"] // ""')" >> "$GITHUB_OUTPUT"
          else
            echo "No published image yet (first run); forcing a build."
            echo "base_digest=" >> "$GITHUB_OUTPUT"
            echo "dante_version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff
        id: diff
        run: |
          if [ "${{ steps.cur.outputs.ready }}" = "true" ] && { \
               [ "${{ steps.cur.outputs.base_digest }}"  != "${{ steps.last.outputs.base_digest }}" ] || \
               [ "${{ steps.cur.outputs.dante_version }}" != "${{ steps.last.outputs.dante_version }}" ]; }; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build each arch natively on its own runner, pushed by digest (untagged).
  # ---------------------------------------------------------------------------
  build:
    needs: check
    if: needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm   # native arm64, no QEMU
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          pull: true
          no-cache: true
          platforms: ${{ matrix.platform }}
          build-args: |
            DANTE_VERSION=${{ needs.check.outputs.dante_version }}
          # Push each arch by digest, untagged; the merge job tags the list.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          labels: |
            org.opencontainers.image.base.digest=${{ needs.check.outputs.base_digest }}
            dante.version=${{ needs.check.outputs.dante_version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stitch the per-arch digests into a single multi-arch manifest list and tag it.
  # ---------------------------------------------------------------------------
  merge:
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
